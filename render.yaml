services:
  - type: web
    name: proyectoweb-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/games
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data/proyectoweb
      - key: FRONTEND_ORIGIN
        value: https://paginadclaves.web.app
      - key: IGDB_CLIENT_ID
        sync: false
      - key: IGDB_CLIENT_SECRET
        sync: false
      - key: HF_API_TOKEN
        sync: false
    disk:
      name: proyectoweb-data
      mountPath: /var/data/proyectoweb
      sizeGB: 1
